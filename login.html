<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin Login | Ahsan Raza Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css" />
  <!-- Firebase SDK -->
  <script type="module">
    // ============================================================
    // FIREBASE SETUP - Replace with your Firebase config
    // See SETUP_GUIDE.md for instructions
    // ============================================================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // TODO: Replace with your Firebase config
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Check if already logged in
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = 'dashboard.html';
      }
    });

    // Login Form
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('loginForm');
      const errMsg = document.getElementById('errorMsg');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');

        btn.innerHTML = 'Signing in...';
        btn.disabled = true;
        errMsg.style.display = 'none';

        try {
          await signInWithEmailAndPassword(auth, email, password);
          window.location.href = 'dashboard.html';
        } catch (error) {
          let msg = 'Login failed. Please check your credentials.';
          if (error.code === 'auth/user-not-found') msg = 'No account found with this email.';
          if (error.code === 'auth/wrong-password') msg = 'Incorrect password.';
          if (error.code === 'auth/invalid-email') msg = 'Invalid email format.';
          if (error.code === 'auth/too-many-requests') msg = 'Too many attempts. Please try again later.';

          errMsg.textContent = msg;
          errMsg.style.display = 'block';
          btn.innerHTML = '🔐 Sign In';
          btn.disabled = false;
        }
      });
    });
  </script>
</head>
<body class="dark" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;">

  <!-- Background -->
  <div style="position:fixed;inset:0;z-index:0;">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(0,229,160,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.03) 1px,transparent 1px);background-size:60px 60px;"></div>
  </div>

  <div style="position:relative;z-index:1;width:100%;max-width:440px;">
    <!-- Logo -->
    <div style="text-align:center;margin-bottom:2.5rem;">
      <div style="width:56px;height:56px;border-radius:16px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;color:#0a0a0f;margin:0 auto 1rem;">AI</div>
      <h1 style="font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;">Admin Dashboard</h1>
      <p class="text-muted" style="font-size:0.9rem;margin-top:0.5rem;">Sign in to manage your portfolio</p>
    </div>

    <!-- Login Card -->
    <div class="card" style="padding:2.5rem;">
      <!-- Error Message -->
      <div id="errorMsg" style="display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:12px 16px;font-size:0.88rem;color:#ef4444;margin-bottom:1.5rem;"></div>

      <form id="loginForm">
        <div style="margin-bottom:1.2rem;">
          <label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:8px;">Email Address</label>
          <input type="email" id="email" class="input-field" placeholder="admin@yoursite.com" required autocomplete="email" />
        </div>

        <div style="margin-bottom:1.8rem;">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
            <label style="font-size:0.85rem;font-weight:600;">Password</label>
          </div>
          <input type="password" id="password" class="input-field" placeholder="••••••••" required autocomplete="current-password" />
        </div>

        <button type="submit" id="loginBtn" class="btn-primary" style="width:100%;justify-content:center;font-size:1rem;padding:15px;">
          🔐 Sign In
        </button>
      </form>
    </div>

    <!-- Back link -->
    <p style="text-align:center;margin-top:1.5rem;" class="text-muted">
      <a href="../index.html" style="text-decoration:none;color:var(--accent);font-size:0.9rem;">← Back to Portfolio</a>
    </p>

    <!-- Setup note -->
    <div style="margin-top:1.5rem;padding:1rem 1.2rem;border-radius:10px;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);">
      <p style="font-size:0.8rem;color:#fbbf24;font-weight:600;margin-bottom:4px;">⚠️ Setup Required</p>
      <p class="text-muted" style="font-size:0.8rem;">Replace Firebase config in this file and create your admin account. See <strong>SETUP_GUIDE.md</strong> for instructions.</p>
    </div>
  </div>

  <script src="../js/main.js"></script>
</body>
</html>
